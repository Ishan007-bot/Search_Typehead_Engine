# Runs the typeahead app with a REAL distributed cache: three independent Redis
# nodes, one per logical cache node. The app's own consistent-hash ring decides
# which Redis node owns each prefix — Redis is just the storage behind each node.
#
#   docker compose up --build
#   → UI/API at http://localhost:8000/
#
# The three Redis instances are genuinely separate processes (ports 6379/6380/6381),
# which is the strongest reading of "distributed cache using consistent hashing".

services:
  redis-0:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6379", "--save", "", "--appendonly", "no"]
    ports: ["6379:6379"]

  redis-1:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6380", "--save", "", "--appendonly", "no"]
    ports: ["6380:6380"]

  redis-2:
    image: redis:7-alpine
    command: ["redis-server", "--port", "6381", "--save", "", "--appendonly", "no"]
    ports: ["6381:6381"]

  app:
    build: .
    ports: ["8000:8000"]
    environment:
      # One host:port per logical node. Inside the compose network each Redis is
      # reachable by its service name on the port it was started with.
      REDIS_NODES: "redis-0:6379,redis-1:6380,redis-2:6381"
    depends_on:
      - redis-0
      - redis-1
      - redis-2
